version: 1
frontend:
  phases:
    preBuild:
      commands:
        - NODE_ENV=development npm ci
    build:
      commands:
        - env | grep -E "DATABASE_URL|NEXTAUTH|S3_|GEMINI|GROQ|NODE_ENV" >> .env.production
        - cat .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
